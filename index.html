<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BCV-consulting | Monitor de Divisas</title>
    
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%23d32f2f"/><stop offset="100%" stop-color="%23ff9800"/></linearGradient></defs><circle cx="56" cy="56" r="36" fill="none" stroke="%23333" stroke-width="8"/><line x1="82" y1="82" x2="112" y2="112" stroke="%23333" stroke-width="8" stroke-linecap="round"/><text x="56" y="68" text-anchor="middle" font-size="40" font-weight="bold" fill="url(%23g)" font-family="Arial, Helvetica, sans-serif">$</text></svg>'>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="BCV Monitor">
    <meta name="theme-color" content="#050505">

    <link rel="stylesheet" href="style.css">

    <meta property="og:title" content="BCV Consulting">
    <meta property="og:description" content="Consulta la tasa oficial del BCV en tiempo real.">
    <meta property="og:image" content="https://frankstein975.github.io/BCV-consulting/icon.png"> <meta property="og:url" content="https://frankstein975.github.io/BCV-consulting/">
</head>
<body>

    <main class="app">
        <header class="app-header">
            <h1>BCV-consulting</h1>
            <button id="btn-share" class="btn-compact" title="Compartir">
                <svg class="icon-share" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                <svg class="icon-wa" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            </button>
        </header>

        <section class="rates-container">
            <div class="card eur">
                <span class="label">EURO (EUR)</span>
                <span id="eur" class="value">0,00</span>
            </div>
            <div class="card usd">
                <span class="label">DÓLAR (USD)</span>
                <span id="usd" class="value">0,00</span>
            </div>
        </section>
        
        <nav class="actions">
            <button id="btn-update">ACTUALIZAR DATOS</button>
            <button id="btn-calc-open" class="secondary">CALCULADORA DE COSTOS</button>
        </nav>

        <footer class="status-bar">
            <div id="dot" class="dot"></div>
            <span id="fecha">Sincronizando...</span>
        </footer>

        <div id="console" class="console">Esperando actualización...</div>
    </main>

    <aside id="calc-modal" class="modal">
        <div class="calc-content">
            <div class="drag-handle"></div>
            <h2>Calculadora de Conversión</h2>
            
            <div class="calc-grid">
                <select id="calc-type">
                    <option value="usd_ves">USD a Bolívares</option>
                    <option value="ves_usd">Bolívares a USD</option>
                    <option value="eur_ves">EUR a Bolívares</option>
                    <option value="ves_eur">Bolívares a EUR</option>
                </select>

                <input type="number" id="calc-input" placeholder="Ingrese monto..." inputmode="decimal">
                
                <div class="res-box">
                    <span class="label">RESULTADO ESTIMADO</span>
                    <div id="calc-result" class="res-val">0,00</div>
                </div>

                <button id="btn-calc-close">CERRAR</button>
            </div>
        </div>
    </aside>

    <footer class="main-footer">
        Desarrollado por <strong>Francesco Di Bella</strong><br>
        <a href="mailto:francodibella@tutanota.com">francodibella@tutanota.com</a>
    </footer>

    <script src="api.js"></script>
    <script src="ui.js"></script>
</body>
</html>
